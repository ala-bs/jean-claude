# Daily merge of shantlr/jean-claude main into this fork, then opens a PR
# into local/light-theme. Runs on the fork's DEFAULT branch only.
#
# After first push: GitHub → Settings → Actions → General → allow workflows.
# Workflows must exist on the default branch (fork main).

name: Daily upstream sync

on:
  schedule:
    # 08:00 UTC — for 08:00 Paris (CET) use "0 7 * * *"; for CEST use "0 6 * * *"
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: upstream-sync
  cancel-in-progress: false

jobs:
  sync-and-open-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync fork main from upstream
        id: sync_main
        run: |
          set -euo pipefail
          git remote add upstream https://github.com/shantlr/jean-claude.git
          git fetch upstream main
          git checkout main
          git merge upstream/main --no-edit
          git push origin main

      - name: Open PR into local/light-theme
        id: open_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          DATE=$(date -u +%Y-%m-%d)
          SYNC_BRANCH="sync/upstream-${DATE}"

          git fetch origin local/light-theme main
          git checkout local/light-theme
          git pull --ff-only origin local/light-theme

          if gh pr list --base local/light-theme --head "${SYNC_BRANCH}" --state open --json number --jq 'length' | grep -q '^[1-9]'; then
            echo "Open PR already exists for ${SYNC_BRANCH}"
            exit 0
          fi

          git checkout -B "${SYNC_BRANCH}"

          merge_failed=false
          if ! git merge origin/main --no-edit; then
            merge_failed=true
            # CI files are canonical on main — auto-resolve to avoid noisy PR failures
            ci_conflicts=$(git diff --name-only --diff-filter=U | grep -E '^(\\.github/|scripts/theme-audit)' || true)
            if [ -n "${ci_conflicts}" ]; then
              while IFS= read -r file; do
                [ -n "${file}" ] && git checkout --theirs "${file}" && git add "${file}"
              done <<< "${ci_conflicts}"
              if [ -z "$(git diff --name-only --diff-filter=U)" ]; then
                git commit --no-edit
                merge_failed=false
                echo "Auto-resolved CI file conflicts from origin/main"
              fi
            fi
          fi

          if [ "${merge_failed}" = true ]; then
            CONFLICTS=$(git diff --name-only --diff-filter=U | sort)
            git merge --abort || true

            ISSUE_BODY="${RUNNER_TEMP}/issue-body.md"
            {
              echo "Automated sync could not merge \`origin/main\` into \`local/light-theme\`."
              echo ""
              echo "## Conflicted files"
              if [ -n "${CONFLICTS}" ]; then
                while IFS= read -r file; do
                  [ -n "${file}" ] && echo "- \`${file}\`"
                done <<< "${CONFLICTS}"
              else
                echo "_Merge failed but no conflict list was produced._"
              fi
              echo ""
              echo "## Resolve locally"
              echo '```bash'
              echo "git fetch upstream && git fetch origin"
              echo "git checkout local/light-theme"
              echo "git merge upstream/main"
              echo "# For each file above: keep upstream logic, keep theme tokens"
              echo "pnpm install && pnpm test"
              echo "pnpm theme:audit -- --base HEAD~1"
              echo "git push origin local/light-theme"
              echo '```'
              echo ""
              echo "Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            } > "${ISSUE_BODY}"

            CONFLICT_LIST=$(echo "${CONFLICTS}" | tr '\n' ',' | sed 's/,$//' | sed 's/,/, /g')

            {
              echo "## Upstream merge conflicts"
              echo ""
              echo "Could not merge \`origin/main\` into \`local/light-theme\`."
              echo ""
              echo "### Conflicted files"
              if [ -n "${CONFLICTS}" ]; then
                while IFS= read -r file; do
                  [ -n "${file}" ] && echo "- \`${file}\`"
                done <<< "${CONFLICTS}"
              fi
              echo ""
              echo "Resolve locally — see repo \`docs/local-fork-automation.md\`."
            } >> "${GITHUB_STEP_SUMMARY}"

            gh label create "upstream-sync" --color "FBCA04" --description "Automated upstream sync" 2>/dev/null || true
            if ! gh issue create \
              --title "Upstream merge conflicts (${DATE})" \
              --label "upstream-sync" \
              --body-file "${ISSUE_BODY}"; then
              gh issue create \
                --title "Upstream merge conflicts (${DATE})" \
                --body-file "${ISSUE_BODY}" \
                || echo "::warning::Could not create issue — enable Issues in repo settings"
            fi

            echo "::error::Merge conflicts in: ${CONFLICT_LIST:-unknown files}. See job Summary."
            exit 1
          fi

          git push -u origin "${SYNC_BRANCH}"

          PR_BODY="${RUNNER_TEMP}/pr-body.md"
          {
            echo "Automated daily sync from [shantlr/jean-claude](https://github.com/shantlr/jean-claude) \`main\`."
            echo ""
            echo "## What to do"
            echo "1. Review the diff"
            echo "2. Wait for **Theme audit** CI (or run locally: \`pnpm theme:audit --base origin/local/light-theme\`)"
            echo "3. Fix any new hardcoded colors, then merge this PR"
          } > "${PR_BODY}"

          if ! gh pr create \
            --repo "${{ github.repository }}" \
            --base local/light-theme \
            --head "${SYNC_BRANCH}" \
            --title "Sync upstream/main (${DATE})" \
            --body-file "${PR_BODY}"; then
            echo "::error::gh pr create failed. Enable: Settings → Actions → General →"
            echo "::error::1) Workflow permissions → Read and write"
            echo "::error::2) Allow GitHub Actions to create and approve pull requests"
            echo ""
            echo "Branch ${SYNC_BRANCH} was pushed — open a PR manually:"
            echo "${{ github.server_url }}/${{ github.repository }}/compare/local/light-theme...${SYNC_BRANCH}?expand=1"
            exit 1
          fi

      - name: Report upstream main sync failure
        if: failure() && steps.sync_main.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          ISSUE_BODY="${RUNNER_TEMP}/sync-main-failure.md"
          {
            echo "Could not merge \`upstream/main\` into fork \`main\`."
            echo ""
            echo "Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo "Resolve locally:"
            echo '```bash'
            echo "git fetch upstream && git fetch origin"
            echo "git checkout main"
            echo "git merge upstream/main"
            echo "git push origin main"
            echo '```'
          } > "${ISSUE_BODY}"
          gh label create "upstream-sync" --color "FBCA04" --description "Automated upstream sync" 2>/dev/null || true
          gh issue create \
            --title "Upstream main sync failed (${DATE})" \
            --label "upstream-sync" \
            --body-file "${ISSUE_BODY}" \
            || true
